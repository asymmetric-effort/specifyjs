name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: Lint ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run format:check
      - name: Import analysis (unused imports & depth)
        run: bun run ../scripts/lint-imports.ts

  # ── Stage 1b: Test (parallel with Lint) ─────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - name: Upload coverage
        if: always() && !env.ACT
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: core/coverage/
          retention-days: 7

  # ── Stage 2a: Coverage Check (parallel with Build) ──────────────────
  # Measures unit + integration test line coverage against the framework
  # source code. E2E and PDV coverage is enforced as pass/fail gates in
  # their own stages — browser-based tests don't produce source-level
  # coverage without Istanbul instrumentation of the production bundle.
  coverage:
    name: Unit & Integration Coverage
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run coverage and check threshold (>=97.8% lines)
        run: |
          bun run test:coverage 2>&1 | tee coverage-output.txt
          # Extract coverage percentage from bun test output
          # Bun reports: "X.XX% line coverage"
          COVERAGE=$(grep -oP '[\d.]+(?=% line coverage)' coverage-output.txt | tail -1 || echo "0")
          echo "Line coverage: ${COVERAGE}%"
          # Fail if coverage is below 97.8%
          if [ -n "$COVERAGE" ]; then
            PASS=$(echo "$COVERAGE >= 97.8" | bc -l 2>/dev/null || echo "1")
            if [ "$PASS" = "0" ]; then
              echo "ERROR: Line coverage ${COVERAGE}% is below the 97.8% threshold"
              exit 1
            fi
          fi
          echo "Coverage check passed: ${COVERAGE}%"

  # ── Stage 2c: Feature Coverage Audit (async, after coverage) ────────
  # Parses TypeScript AST to extract all exported Props/API interface
  # properties as features, then cross-references @feature annotations
  # in E2E/PDV test files. Runs in warn mode — does not block other stages.
  feature-audit:
    name: Feature Coverage Audit
    needs: [coverage]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run feature coverage audit
        run: bun run ../scripts/feature-coverage-audit.ts

  # ── Stage 2b: Build (parallel with Coverage Check) ─────────────────
  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build
        run: |
          test -f dist/specifyjs.esm.js && test -f dist/specifyjs.cjs.js && test -f dist/specifyjs.d.ts
          gzip -k dist/specifyjs.esm.js
          SIZE=$(wc -c < dist/specifyjs.esm.js.gz)
          echo "ESM gzipped: $SIZE bytes"
          rm dist/specifyjs.esm.js.gz
          [ "$SIZE" -le 15360 ] || (echo "ERROR: Bundle exceeds 15KB" && exit 1)
      - name: Upload build
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: core/dist/
          retention-days: 7

  # ── Stage 3: E2E (after Build and Coverage Check) ───────────────────
  e2e:
    name: E2E (${{ matrix.browser }})
    needs: [build, coverage]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x playwright install ${{ matrix.browser }} --with-deps
      - run: bun x playwright test --project=${{ matrix.browser }}

  # ── Stage 5: Build Site (not on PRs) ────────────────────────────────
  build-site:
    name: Build Showcase Site
    needs: e2e
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest
      - name: Build core library (dist/ artifacts for site)
        working-directory: core
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Build with relative base
        working-directory: site
        run: |
          npm install
          npx vite build --base='./'
      - name: Verify banners
        working-directory: site/dist
        run: |
          head -1 assets/*.js | grep -q "Asymmetric Effort" || exit 1
          head -1 assets/*.css | grep -q "Asymmetric Effort" || exit 1
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-build
          path: site/dist/
          retention-days: 1

  # ── Stage 6: Deploy to /staging/ (blue-green) ───────────────────────
  deploy:
    name: Deploy Showcase Site
    needs: build-site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-build
          path: new-build
      - name: Deploy new build to /staging/
        run: |
          cd gh-pages
          rm -rf staging
          cp -r ../new-build staging
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" || git commit -m "Deploy staging from ${{ github.sha }}"
          git push origin gh-pages

  # ── Stage 7a: PDV against /staging/ ─────────────────────────────────
  pdv:
    name: Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install Playwright
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps
      - name: Wait for staging deploy
        run: |
          EXPECTED=$(node -p "require('./core/package.json').version")
          echo "Waiting for staging to serve v${EXPECTED}..."
          for i in $(seq 1 60); do
            # Bust CDN cache by appending a unique query string
            CACHEBUST="?cb=$(date +%s)-$i"
            VER=$(curl -sk "https://specifyjs.asymmetric-effort.com/staging/version.txt${CACHEBUST}" 2>/dev/null | tr -d '[:space:]')
            # Verify HTML loads with JS bundle references (any chunk name)
            HTML=$(curl -sk "https://specifyjs.asymmetric-effort.com/staging/index.html${CACHEBUST}" 2>/dev/null)
            HAS_JS=$(echo "$HTML" | grep -c '\.js"' || true)
            if [ "$VER" = "v${EXPECTED}" ] && [ "$HAS_JS" -gt 0 ]; then
              echo "Staging confirmed: v${EXPECTED} after ${i}0s"; exit 0
            fi
            echo "Attempt $i/60: version.txt=$VER has_js=$HAS_JS"; sleep 10
          done
          echo "ERROR: staging did not converge after 10 minutes"
          exit 1
      - name: Run PDV against staging
        working-directory: site
        env:
          SITE_URL: https://specifyjs.asymmetric-effort.com/staging/
        run: npx playwright test --config=playwright.deploy.config.ts
      - name: Upload staging PDV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdv-staging-report
          path: site/playwright-report/
          retention-days: 7

  # ── Stage 7b: Promote staging to production ─────────────────────────
  promote:
    name: Promote to Production
    needs: pdv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: gh-pages
          path: gh-pages
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Copy staging to root
        run: |
          cd gh-pages
          # Preserve CNAME and .nojekyll
          cp CNAME /tmp/CNAME.bak 2>/dev/null || true
          cp .nojekyll /tmp/.nojekyll.bak 2>/dev/null || true
          # Remove old root content (except staging/, .git/, CNAME, .nojekyll)
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'staging' ! -name 'CNAME' ! -name '.nojekyll' -exec rm -rf {} +
          # Copy staging content to root
          cp -r staging/* .
          # Restore CNAME and .nojekyll
          cp /tmp/CNAME.bak CNAME 2>/dev/null || echo "specifyjs.asymmetric-effort.com" > CNAME
          cp /tmp/.nojekyll.bak .nojekyll 2>/dev/null || touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" || git commit -m "Promote staging to production from ${{ github.sha }}"
          git push origin gh-pages
      - name: Wait for production deploy
        run: |
          for i in $(seq 1 30); do
            JS=$(curl -sk "https://specifyjs.asymmetric-effort.com/?_cb=$(date +%s%N)" | grep -oP 'assets/index-[^"]+\.js' || true)
            if [ -n "$JS" ]; then
              if curl -sk "https://specifyjs.asymmetric-effort.com/$JS" | grep -q 'SpecifyJS'; then
                echo "Production content confirmed after ${i}0s"; exit 0
              fi
            fi
            echo "Attempt $i/30..."; sleep 10
          done
      - name: Run PDV against production
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps
          npx playwright test --config=playwright.deploy.config.ts
      - name: Upload production PDV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdv-production-report
          path: site/playwright-report/
          retention-days: 7

  # ── Stage 8: Publish to npm (ONLY tagged builds, after PDV) ─────────
  publish:
    name: Publish to npm
    needs: promote
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - uses: asymmetric-effort/actions/actions/setup-bun@57dc7b4045a08bb8804c495e4fd034985ac3cb1a # main (cache v5/node24)
        with:
          bun-version: latest

      - name: Configure npm for OIDC
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Build
        working-directory: core
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./core/package.json').version")
          [ "$TAG" = "$PKG" ] || (echo "Tag v$TAG != package.json $PKG" && exit 1)
          echo "Version: $PKG"

      - name: Publish @asymmetric-effort/specifyjs
        working-directory: core
        run: npx npm@latest publish --provenance --access public

      - name: Verify npm publish
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for npm registry to reflect v$TAG..."
          for i in $(seq 1 10); do
            LATEST=$(npm view @asymmetric-effort/specifyjs version 2>/dev/null || echo "")
            if [ "$LATEST" = "$TAG" ]; then
              echo "Verified: @asymmetric-effort/specifyjs@$TAG is live on npm"
              exit 0
            fi
            echo "Attempt $i/10: latest=$LATEST, expected=$TAG"; sleep 5
          done
          echo "WARNING: npm may still be propagating"
