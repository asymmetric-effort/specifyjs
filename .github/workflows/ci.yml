name: Full CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: Lint ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: asymmetric-effort/actions/actions/setup-bun@dd672dbe45f31de265750b4f6098a97fd3af2df2 # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run format:check

  # ── Stage 2: Test ───────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: asymmetric-effort/actions/actions/setup-bun@dd672dbe45f31de265750b4f6098a97fd3af2df2 # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - name: Upload coverage
        if: always() && !env.ACT
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: core/coverage/
          retention-days: 7

  # ── Stage 3: Build ──────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: asymmetric-effort/actions/actions/setup-bun@dd672dbe45f31de265750b4f6098a97fd3af2df2 # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify build
        run: |
          test -f dist/specifyjs.esm.js && test -f dist/specifyjs.cjs.js && test -f dist/specifyjs.d.ts
          gzip -k dist/specifyjs.esm.js
          SIZE=$(wc -c < dist/specifyjs.esm.js.gz)
          echo "ESM gzipped: $SIZE bytes"
          rm dist/specifyjs.esm.js.gz
          [ "$SIZE" -le 15360 ] || (echo "ERROR: Bundle exceeds 15KB" && exit 1)
      - name: Upload build
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: core/dist/
          retention-days: 7

  # ── Stage 4: E2E ────────────────────────────────────────────────────
  e2e:
    name: E2E (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: asymmetric-effort/actions/actions/setup-bun@dd672dbe45f31de265750b4f6098a97fd3af2df2 # main (cache v5/node24)
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x playwright install ${{ matrix.browser }} --with-deps
      - run: bun x playwright test --project=${{ matrix.browser }}

  # ── Stage 5: Build Site (not on PRs) ────────────────────────────────
  build-site:
    name: Build Showcase Site
    needs: e2e
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Build
        working-directory: site
        run: |
          npm install
          npx vite build
      - name: Verify banners
        working-directory: site/dist
        run: |
          head -1 assets/*.js | grep -q "Asymmetric Effort" || exit 1
          head -1 assets/*.css | grep -q "Asymmetric Effort" || exit 1
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  # ── Stage 6: Deploy Site (not on PRs) ───────────────────────────────
  deploy:
    name: Deploy Showcase Site
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  # ── Stage 7: PDV (not on PRs) ──────────────────────────────────────
  pdv:
    name: Post-Deployment Verification
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install Playwright
        working-directory: site
        run: |
          npm install
          npx playwright install chromium --with-deps
      - name: Wait for CDN
        run: |
          for i in $(seq 1 30); do
            JS=$(curl -sk "https://specifyjs.asymmetric-effort.com/?_cb=$(date +%s%N)" | grep -oP 'assets/index-[^"]+\.js' || true)
            if [ -n "$JS" ]; then
              if curl -sk "https://specifyjs.asymmetric-effort.com/$JS" | grep -q 'SpecifyJS'; then
                echo "Fresh content confirmed after ${i}0s"; exit 0
              fi
            fi
            echo "Attempt $i/30..."; sleep 10
          done
      - name: Run PDV E2E
        id: e2e
        working-directory: site
        run: npx playwright test --config=playwright.deploy.config.ts
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pdv-report
          path: site/playwright-report/
          retention-days: 7

  # ── Stage 8: Publish to npm (ONLY tagged builds, after PDV) ─────────
  publish:
    name: Publish to npm
    needs: pdv
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - uses: asymmetric-effort/actions/actions/setup-bun@dd672dbe45f31de265750b4f6098a97fd3af2df2 # main (cache v5/node24)
        with:
          bun-version: latest

      - name: Configure npm for OIDC
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc

      - name: Build
        working-directory: core
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./core/package.json').version")
          [ "$TAG" = "$PKG" ] || (echo "Tag v$TAG != package.json $PKG" && exit 1)
          echo "Version: $PKG"

      - name: Publish @asymmetric-effort/specifyjs
        working-directory: core
        run: npx npm@latest publish --provenance --access public

      - name: Verify npm publish
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "Waiting for npm registry to reflect v$TAG..."
          for i in $(seq 1 10); do
            LATEST=$(npm view @asymmetric-effort/specifyjs version 2>/dev/null || echo "")
            if [ "$LATEST" = "$TAG" ]; then
              echo "Verified: @asymmetric-effort/specifyjs@$TAG is live on npm"
              exit 0
            fi
            echo "Attempt $i/10: latest=$LATEST, expected=$TAG"; sleep 5
          done
          echo "WARNING: npm may still be propagating"
