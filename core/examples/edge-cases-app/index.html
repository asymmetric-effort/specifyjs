<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpecifyJS Edge Cases</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    h1 { margin-bottom: 24px; }
    section { margin-bottom: 32px; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    section h2 { margin-bottom: 12px; font-size: 18px; color: #374151; }
    button { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 4px; cursor: pointer; background: #fff; margin: 2px; }
    button:hover { background: #f3f4f6; }
    .list-item { padding: 4px 8px; border-bottom: 1px solid #f3f4f6; }
    .error-fallback { color: #ef4444; padding: 12px; background: #fef2f2; border-radius: 4px; }
    .event-log { font-size: 12px; color: #6b7280; max-height: 120px; overflow-y: auto; background: #f9fafb; padding: 8px; border-radius: 4px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/app.ts"></script>
