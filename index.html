      <h3>SpecifyJS</h3>
      <p>A declarative TypeScript UI framework built for performance, browser compatibility, and developer simplicity.</p>
      <ul>
        <li><strong>Zero runtime dependencies</strong> — every algorithm implemented from scratch</li>
        <li><strong>TypeScript-first</strong> — full type definitions, strict mode</li>
        <li><strong>React API parity</strong> — familiar hooks, components, and patterns</li>
        <li><strong>Concurrent rendering</strong> — lane-based priority system</li>
        <li><strong>ARIA compliant</strong> — development-time accessibility warnings</li>
      </ul>
      <h3>Getting Started</h3>
      <pre><code>npm install @asymmetric-effort/specifyjs</code></pre>
      <pre><code>import { createElement } from 'specifyjs';
import { createRoot } from 'specifyjs/dom';

function App() {
  return createElement('h1', null, 'Hello, SpecifyJS!');
}

createRoot(document.getElementById('root')).render(createElement(App, null));</code></pre>

        <h2 class="ns-section-title">Documentation</h2>
        <div class="ns-section-content">
          <p>Complete documentation covering guides, API reference, and architecture.</p><h3>Guides</h3><ul><li><strong>3D Space Demo Guide</strong>: &lt;!-- (c) 2025-2026 Asymmetric Effort, LLC. MIT LICENSE --&gt;</li><li><strong>Accessibility</strong>: Building accessible applications ensures that all users -- including those who rely on assistive technologies, keyboard navigation, or alternative input devices -- can interact with your UI. SpecifyJS renders standard DOM elements, so all native accessibility features of HTML and ARIA are available through `createElement`.</li><li><strong>Async Function Evaluation</strong>: &lt;!-- (c) 2025-2026 Asymmetric Effort, LLC. MIT LICENSE --&gt;</li><li><strong>Browser Support</strong>: SpecifyJS targets modern browsers with ES2020+ support. The framework has zero runtime dependencies, so browser compatibility is determined solely by the JavaScript and DOM APIs it uses.</li><li><strong>Building Single-Page Applications</strong>: SpecifyJS is designed for building SPAs that compile to minified JavaScript for high-performance browser execution.</li><li><strong>Code Splitting</strong>: Code splitting lets you break your application into smaller chunks that are loaded on demand. SpecifyJS supports this through `lazy()` for dynamic imports and `Suspense` for rendering fallback UI while chunks load.</li><li><strong>Concurrent Rendering</strong>: Concurrent rendering allows SpecifyJS to work on multiple state updates simultaneously, prioritizing urgent interactions (like typing) over less critical updates (like filtering a large list). This keeps the UI responsive even during expensive renders.</li><li><strong>Core Concepts</strong>: SpecifyJS elements are lightweight objects describing what to render:</li><li><strong>Custom Hooks</strong>: Custom hooks let you extract reusable stateful logic from components. They are regular functions that call built-in hooks internally.</li><li><strong>Deployment</strong>: This guide covers building SpecifyJS applications for production and deploying them to common hosting platforms.</li><li><strong>Error Handling</strong>: Errors in a UI tree can leave the entire application in a broken state. SpecifyJS provides **error boundaries** -- class components that catch errors during rendering, lifecycle methods, and constructors of any component below them in the tree.</li><li><strong>Feature Flags</strong>: SpecifyJS includes a built-in feature flag system based on the Context API. It allows you to gate UI features behind boolean flags, load flag configuration from static JSON, and toggle flags at runtime.</li><li><strong>Forms and Validation</strong>: This guide covers building forms in SpecifyJS, from basic inputs to complex multi-step wizards with async validation.</li><li><strong>Getting Started</strong>: - Node.js 24+</li><li><strong>Meta Tags</strong>: The `useHead` hook lets components declaratively manage document `&lt;head&gt;` meta tags. Tags are applied when the component mounts and cleaned up when it unmounts, preventing stale metadata from persisting across route changes.</li><li><strong>Migrating from React</strong>: SpecifyJS is designed with React API parity. Most React code works with minimal changes.</li><li><strong>Performance Optimization</strong>: This guide explains how SpecifyJS renders, why unnecessary work happens, and the tools available to eliminate it.</li><li><strong>Production Builds</strong>: Build the SpecifyJS library for distribution:</li><li><strong>Render Safety — Render Guard System</strong>: &lt;!-- (c) 2025-2026 Asymmetric Effort, LLC. MIT LICENSE --&gt;</li><li><strong>Routing</strong>: SpecifyJS includes a built-in hash-based router for single-page applications. The router listens to changes in the URL hash (`window.location.hash`) and renders components conditionally based on the current path. No server configuration is required -- the router works on any static file host, including GitHub Pages, S3, and Netlify.</li><li><strong>SEO — Sitemap, Robots, LLMs, and Noscript Fallback</strong>: &lt;!-- (c) 2025-2026 Asymmetric Effort, LLC. MIT LICENSE --&gt;</li><li><strong>State Management</strong>: SpecifyJS provides a layered approach to state management. Simple components use `useState`, components with complex transitions use `useReducer`, and cross-component state is shared through the Context API. For integration with external stores, `useSyncExternalStore` provides tear-free reads with automatic re-rendering.</li><li><strong>Styling</strong>: SpecifyJS supports multiple approaches to styling components, from inline styles to CSS classes, CSS modules, and dynamic theming via the Context API.</li><li><strong>Testing</strong>: SpecifyJS applications use three levels of testing.</li><li><strong>Troubleshooting</strong>: Common questions and solutions when working with SpecifyJS.</li><li><strong>TypeScript Patterns</strong>: SpecifyJS is a **TypeScript-first** framework. The entire codebase is written in strict mode (`"strict": true`), and all public APIs ship with full type definitions. This guide covers common typing patterns you will encounter when building SpecifyJS applications.</li><li><strong>Wumpus World Demo</strong>: A 2D demonstration of the classic AI problem from Russell and Norvig's "Artificial Intelligence: A Modern Approach," implemented as a SpecifyJS showcase application. The demo is available at `/#/wumpus` on the showcase site.</li></ul><h3>API Reference</h3><ul><li>API Reference</li><li>Components API</li><li>Compute — GPU Compute Abstraction</li><li>DOM API</li><li>Hooks API</li><li>Math — Linear Algebra Library</li><li>Static Pre-rendering API</li><li>TypeScript Types</li></ul>

      <section id="concurrent" class="ns-section">
        <h2 class="ns-section-title">Concurrent Rendering</h2>
        <div class="ns-section-content">
          
      <p>SpecifyJS implements lane-based concurrent rendering with the same priority levels as React 18:</p>
      <ul>
        <li><strong>SyncLane</strong> — highest priority, used by flushSync and discrete events</li>
        <li><strong>DefaultLane</strong> — normal state updates and event handlers</li>
        <li><strong>TransitionLane</strong> — lower priority, used with startTransition/useTransition</li>
      </ul>
      <h3>useTransition</h3>
      <p>Mark state updates as non-urgent so they can be interrupted by higher-priority work.</p>
      <h3>useDeferredValue</h3>
      <p>Returns a deferred copy of a value that lags behind during urgent updates.</p>
      <h3>startTransition</h3>
      <p>Standalone function for marking updates as transitions outside of components.</p>
    
        </div>

      </section>

        <div class="ns-section-content">
          
      <p>SpecifyJS applications fetch data via HTTPS from API endpoints. The framework provides:</p>
      <ul>
        <li><strong>secureFetch</strong> — HTTPS-only fetch wrapper that blocks insecure requests</li>
        <li><strong>useFetch hook pattern</strong> — custom hook for data loading with loading/error states</li>
        <li><strong>Feature flags</strong> — FeatureFlagProvider for feature gating with remote JSON config</li>
      </ul>
